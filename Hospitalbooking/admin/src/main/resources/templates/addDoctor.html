<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Doctor</title>

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

<style>
body{background:#f4f6f9;}

.form-card{
max-width:900px;
margin:auto;
margin-top:50px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
background:white;
padding:30px;
}

.section-title{
font-weight:600;
margin-top:20px;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<a class="navbar-brand"  th:href="@{/home}">Hospital Admin</>
<button class="btn btn-danger">Logout</button>
</nav>

<div class="container">

<div class="form-card">

<h3>Add Doctor</h3>

<form>

<div class="row">

<div class="col-md-6">
<input class="form-control mb-3" placeholder="Name">
<input class="form-control mb-3" placeholder="Specialization">
<input class="form-control mb-3" placeholder="Experience">
<input class="form-control mb-3" placeholder="Qualification">
<input class="form-control mb-3" placeholder="Email">
<input class="form-control mb-3" placeholder="Phone">
</div>

<div class="col-md-6">
<input class="form-control mb-3" placeholder="Consultation Fee">
<input class="form-control mb-3" placeholder="Available Days">
<input class="form-control mb-3" placeholder="Available Time">
<input class="form-control mb-3" placeholder="Address">
<input type="file" class="form-control mb-3">
</div>

</div>

<h5 class="section-title">About Doctor</h5>
<textarea class="form-control mb-3" rows="3"></textarea>

<button class="btn btn-success">Save</button>
<a href="doctors.html" class="btn btn-secondary">Cancel</a>

</form>

</div>

</div>

</body>
</html>
